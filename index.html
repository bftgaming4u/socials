<body>

    <canvas id="bg-canvas"></canvas>

    <!-- ── HERO ─────────────────────────────────────── -->
    <header class="hero">
        <!--
      BANNER: Replace src with "assets/banner.png" when ready.
      Recommended size: 2048×1152 px.
      object-position: top ensures the top edge is always visible.
    -->
        <div class="banner-wrap">
            <img id="banner-img" src="assets/banner.jpg" alt="BFT Gaming Banner" class="banner"
                onerror="this.src='assets/banner_placeholder.svg'; this.onerror=null;" />
            <div class="banner-overlay"></div>
        </div>

        <!--
      LOGO: Replace src with "assets/logo.jpg" (or .png) when ready.
      Recommended size: 120×120 px minimum.
    -->
        <div class="profile">
            <div class="avatar-ring">
                <img id="logo-img" src="assets/logo.jpg" alt="BFT Gaming Logo" class="logo"
                    onerror="this.src='assets/logo_placeholder.svg'; this.onerror=null;" />
            </div>
            <h1 class="display-name">BFT Gaming</h1>
            <p class="tagline">Content Creator · Streamer · Community</p>
        </div>
    </header>

            </div>

        <span id="music-icon">🔇</span>
    </button>
    <audio id="bg-music" loop>

    </audio>
